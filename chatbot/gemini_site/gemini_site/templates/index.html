<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #111128;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --accent-primary: #6366f1;
            --accent-secondary: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(255, 255, 255, 0.08);
            --user-bubble: linear-gradient(135deg, #6366f1, #8b5cf6);
            --ai-bubble: rgba(255, 255, 255, 0.06);
            --success-green: #22c55e;
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-gradient .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s infinite ease-in-out;
        }

        .bg-gradient .orb:nth-child(1) {
            width: 600px;
            height: 600px;
            background: #6366f1;
            top: -200px;
            left: -100px;
            animation-delay: 0s;
        }

        .bg-gradient .orb:nth-child(2) {
            width: 500px;
            height: 500px;
            background: #8b5cf6;
            bottom: -150px;
            right: -100px;
            animation-delay: -7s;
        }

        .bg-gradient .orb:nth-child(3) {
            width: 400px;
            height: 400px;
            background: #06b6d4;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(30px, -30px) scale(1.05);
            }

            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }

            75% {
                transform: translate(20px, 10px) scale(1.02);
            }
        }

        /* Main Layout */
        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 24px 0 16px;
            flex-shrink: 0;
        }

        .header-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--user-bubble);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 24px var(--accent-glow);
            animation: pulse-glow 3s infinite ease-in-out;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 24px var(--accent-glow);
            }

            50% {
                box-shadow: 0 0 40px var(--accent-glow), 0 0 60px rgba(99, 102, 241, 0.15);
            }
        }

        .header-text h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .header-text p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: var(--success-green);
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            margin-top: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--success-green);
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        .chat-area::-webkit-scrollbar {
            width: 5px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Welcome Screen */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 20px;
            animation: fadeIn 0.8s ease;
        }

        .welcome-icon {
            font-size: 56px;
            animation: bounce-in 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounce-in {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .welcome-screen h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-screen p {
            color: var(--text-muted);
            font-size: 0.95rem;
            max-width: 400px;
            line-height: 1.6;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 500px;
        }

        .suggestion-chip {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .suggestion-chip:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-primary);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 85%;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.ai {
            align-self: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.user .avatar {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        .message.ai .avatar {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.9rem;
            position: relative;
        }

        .message.user .bubble {
            background: var(--user-bubble);
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .message.ai .bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
            backdrop-filter: blur(10px);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 16px 20px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* Input Area */
        .input-area {
            flex-shrink: 0;
            padding: 16px 0 24px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 6px 6px 6px 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(20px);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-lg);
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.92rem;
            padding: 10px 0;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            border: none;
            background: var(--user-bubble);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.08);
            box-shadow: 0 0 24px var(--accent-glow);
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            transition: transform 0.2s ease;
        }

        .send-btn:hover:not(:disabled) svg {
            transform: translateX(2px);
        }

        .footer-text {
            text-align: center;
            margin-top: 10px;
            font-size: 0.72rem;
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .app-container {
                padding: 0 10px;
            }

            .header-text h1 {
                font-size: 1.2rem;
            }

            .message {
                max-width: 92%;
            }

            .welcome-screen h2 {
                font-size: 1.4rem;
            }

            .suggestions {
                gap: 6px;
            }

            .suggestion-chip {
                font-size: 0.78rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-gradient">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-icon">✦</div>
            <div class="header-text">
                <h1>Gemini AI</h1>
                <div class="status-badge">
                    <span class="status-dot"></span>
                    Online
                </div>
            </div>
        </header>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">🌟</div>
                <h2>Hello! How can I help?</h2>
                <p>I'm powered by Google's Gemini AI. Ask me anything — from creative writing to coding help.</p>
                <div class="suggestions">
                    <button class="suggestion-chip" onclick="useSuggestion(this)">✨ Write a short poem</button>
                    <button class="suggestion-chip" onclick="useSuggestion(this)">🧠 Explain quantum computing</button>
                    <button class="suggestion-chip" onclick="useSuggestion(this)">💡 Give me a startup idea</button>
                    <button class="suggestion-chip" onclick="useSuggestion(this)">🐍 Python tips for beginners</button>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="prompt" placeholder="Ask Gemini anything..."
                    onkeydown="if(event.key==='Enter') askAI()" autocomplete="off">
                <button class="send-btn" id="sendBtn" onclick="askAI()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <p class="footer-text">Gemini may produce inaccurate information. Verify important facts.</p>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const promptInput = document.getElementById('prompt');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        let isFirstMessage = true;

        function useSuggestion(chip) {
            const text = chip.textContent.replace(/^[^\w]*/, '').trim();
            promptInput.value = text;
            askAI();
        }

        function addMessage(content, type) {
            if (isFirstMessage) {
                welcomeScreen.style.display = 'none';
                isFirstMessage = false;
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = type === 'user' ? '👤' : '✦';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            return messageDiv;
        }

        function showTyping() {
            if (isFirstMessage) {
                welcomeScreen.style.display = 'none';
                isFirstMessage = false;
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            messageDiv.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = '✦';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function askAI() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            // Disable input while processing
            promptInput.value = '';
            sendBtn.disabled = true;
            promptInput.disabled = true;

            // Add user message
            addMessage(prompt, 'user');

            // Show typing indicator
            showTyping();

            try {
                const response = await fetch('/generate/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();
                removeTyping();
                addMessage(data.response, 'ai');
            } catch (error) {
                removeTyping();
                addMessage('Sorry, something went wrong. Please try again.', 'ai');
            } finally {
                sendBtn.disabled = false;
                promptInput.disabled = false;
                promptInput.focus();
            }
        }

        // Focus input on load
        promptInput.focus();
    </script>
</body>

</html>
